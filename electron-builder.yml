appId: com.lazyhire.app
productName: LazyHire

directories:
  buildResources: src/build

mac:
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  category: public.app-category.productivity
  hardenedRuntime: true
  notarize: true

dmg:
  title: LazyHire

win:
  target:
    - target: nsis
      arch:
        - x64
  # Unsigned for now — Windows will show a SmartScreen warning until a code
  # signing cert is added. Once you have a .pfx, set CSC_LINK/CSC_KEY_PASSWORD
  # the same way APPLE_CERTIFICATE is set for mac; electron-builder picks them
  # up automatically, no yml change needed.

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

publish:
  provider: github
  owner: snesjhon
  repo: lazyhire

files:
  - out/**/*
  - "!**/*.map"
  - "!node_modules/@anthropic-ai/claude-code/vendor/claude-code-jetbrains-plugin/**/*"
