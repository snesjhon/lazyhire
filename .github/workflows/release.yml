name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      sha256: ${{ steps.sha256.outputs.hash }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build --compile src/index.tsx --outfile lazyhire-mac-arm64

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm /tmp/certificate.p12

      - name: Sign binary
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' \
            '  <key>com.apple.security.cs.allow-unsigned-executable-memory</key><true/>' \
            '  <key>com.apple.security.cs.disable-library-validation</key><true/>' \
            '</dict></plist>' > entitlements.plist
          codesign --remove-signature lazyhire-mac-arm64 || true
          codesign --sign "Developer ID Application: Jhonatan Paredes ($APPLE_TEAM_ID)" \
            --options runtime \
            --timestamp \
            --force \
            --entitlements entitlements.plist \
            lazyhire-mac-arm64

      - name: Notarize binary
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          zip lazyhire-mac-arm64.zip lazyhire-mac-arm64
          xcrun notarytool submit lazyhire-mac-arm64.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          rm lazyhire-mac-arm64.zip

      - name: Compute SHA256
        id: sha256
        run: |
          HASH=$(shasum -a 256 lazyhire-mac-arm64 | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazyhire-mac-arm64
          path: lazyhire-mac-arm64

  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      sha256: ${{ steps.sha256.outputs.hash }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build --compile src/index.tsx --outfile lazyhire-windows-x64

      - name: Compute SHA256
        id: sha256
        run: |
          $hash = (Get-FileHash lazyhire-windows-x64.exe -Algorithm SHA256).Hash.ToLower()
          echo "hash=$hash" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lazyhire-windows-x64
          path: lazyhire-windows-x64.exe

  release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: lazyhire-mac-arm64

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: lazyhire-windows-x64

      - name: Write release files
        run: |
          TAG="${{ github.ref_name }}"
          REPO="${{ github.repository }}"
          echo "$TAG" > latest.txt
          cat > manifest.json <<EOF
          {
            "version": "$TAG",
            "platforms": {
              "darwin-arm64": {
                "url": "https://github.com/$REPO/releases/download/$TAG/lazyhire-mac-arm64",
                "sha256": "${{ needs.build-mac.outputs.sha256 }}"
              },
              "windows-x64": {
                "url": "https://github.com/$REPO/releases/download/$TAG/lazyhire-windows-x64.exe",
                "sha256": "${{ needs.build-windows.outputs.sha256 }}"
              }
            }
          }
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            lazyhire-mac-arm64 \
            lazyhire-windows-x64.exe \
            manifest.json \
            latest.txt \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
